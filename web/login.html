<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Вход — CS</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='85' font-size='80' text-anchor='middle' dominant-baseline='middle'%3E🌀%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='85' font-size='80' text-anchor='middle' dominant-baseline='middle'%3E🌀%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #03030a;
            --bg-primary: #0a0a15;
            --bg-secondary: #111120;
            --bg-card: rgba(20, 20, 40, 0.6);
            --bg-card-solid: #15152a;
            --border-glow: rgba(110, 74, 255, 0.3);
            --accent-primary: #6e4aff;
            --accent-secondary: #9b6eff;
            --accent-glow: rgba(110, 74, 255, 0.4);
            --text-primary: #f0f0ff;
            --text-secondary: #a0a0c0;
            --text-muted: #6a6a8a;
            --google-color: #37ff00;
            --yandex-color: #fc3f1d;
            --vk-color: #0077ff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(110, 74, 255, 0.08), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 214, 143, 0.05), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body.dimmed::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 40;
            pointer-events: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .navbar {
            background: rgba(10, 10, 21, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(110, 74, 255, 0.2);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: var(--accent-primary);
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .auth-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 48px;
        }

        .bubbles-triangle {
            position: relative;
            width: 500px;
            height: 450px;
            margin: 0 auto 60px;
        }

        .bubble-wrapper {
            position: absolute;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 20;
        }

        .bubble-wrapper:nth-child(1) { left: 30px; top: 50px; }
        .bubble-wrapper:nth-child(2) { right: 30px; top: 50px; }
        .bubble-wrapper:nth-child(3) { left: 50%; bottom: 30px; transform: translateX(-50%); }

        .provider-bubble {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--border-glow);
            animation: float 6s ease-in-out infinite;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
        }

        .provider-bubble.google {
            border-color: var(--google-color);
        }

        .provider-bubble.yandex {
            border-color: var(--yandex-color);
        }

        .provider-bubble.vk {
            border-color: var(--vk-color);
        }

        .provider-bubble svg {
            width: 60px;
            height: 60px;
            transition: all 0.5s ease;
        }

        .provider-bubble.google svg {
            fill: var(--google-color);
        }

        .provider-bubble.yandex svg {
            fill: var(--yandex-color);
        }

        .provider-bubble.vk svg {
            fill: var(--vk-color);
        }

        .provider-bubble.google:hover,
        .provider-bubble.google.touching {
            width: 400px;
            height: 400px;
            transform: translate(-20%, -20%);
            box-shadow: 0 0 80px rgba(66, 133, 244, 0.4);
            border-color: var(--google-color);
            z-index: 100;
        }

        .provider-bubble.yandex:hover,
        .provider-bubble.yandex.touching {
            width: 400px;
            height: 400px;
            transform: translate(20%, -20%);
            box-shadow: 0 0 80px rgba(252, 63, 29, 0.4);
            border-color: var(--yandex-color);
            z-index: 100;
        }

        .provider-bubble.vk:hover,
        .provider-bubble.vk.touching {
            width: 400px;
            height: 400px;
            transform: translate(-50%, 10%);
            box-shadow: 0 0 80px rgba(0, 119, 255, 0.4);
            border-color: var(--vk-color);
            z-index: 100;
        }

        .provider-bubble:hover svg,
        .provider-bubble.touching svg {
            width: 200px;
            height: 200px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .info-text {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-glow);
        }

        .info-text a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        footer {
            background: rgba(10, 10, 21, 0.7);
            border-top: 1px solid var(--border-glow);
            padding: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            .subtitle {
                font-size: 16px;
                margin-bottom: 30px;
            }
            .bubbles-triangle {
                width: 350px;
                height: 350px;
            }
            .bubble-wrapper:nth-child(1) { left: 0; top: 30px; }
            .bubble-wrapper:nth-child(2) { right: 0; top: 30px; }
            .bubble-wrapper:nth-child(3) { bottom: 0; }
            .provider-bubble {
                width: 90px;
                height: 90px;
            }
            .provider-bubble svg {
                width: 45px;
                height: 45px;
            }
            .provider-bubble.google:hover,
            .provider-bubble.google.touching,
            .provider-bubble.yandex:hover,
            .provider-bubble.yandex.touching,
            .provider-bubble.vk:hover,
            .provider-bubble.vk.touching {
                width: 300px;
                height: 300px;
            }
            .provider-bubble:hover svg,
            .provider-bubble.touching svg {
                width: 150px;
                height: 150px;
            }
        }

        @media (max-width: 480px) {
            .bubbles-triangle {
                width: 280px;
                height: 280px;
            }
            .provider-bubble {
                width: 75px;
                height: 75px;
            }
            .provider-bubble svg {
                width: 38px;
                height: 38px;
            }
            .provider-bubble.google:hover,
            .provider-bubble.google.touching,
            .provider-bubble.yandex:hover,
            .provider-bubble.yandex.touching,
            .provider-bubble.vk:hover,
            .provider-bubble.vk.touching {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🌀 CS</div>
            <div class="nav-links">
                <a href="/" class="back-link">← На главную</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="auth-container">
            <h1>Добро пожаловать</h1>
            <div class="subtitle">Нажмите и удерживайте чтобы войти</div>

            <div class="bubbles-triangle">
                <div class="bubble-wrapper" data-provider="google">
                    <a href="/api/auth/google/login" class="provider-bubble google">
                        <svg viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                    </a>
                </div>
                <div class="bubble-wrapper" data-provider="yandex">
                    <a href="/api/auth/yandex/login" class="provider-bubble yandex">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.04 12c0-5.52 4.44-10 9.96-10s9.96 4.48 9.96 10-4.44 10-9.96 10S2.04 17.52 2.04 12zm10.56 5.92V12.8h-1.2v5.12c-.4.08-.8.08-1.2.08-.4 0-.8 0-1.2-.08V12.8h-1.2v5.12c-2.4-.48-4.2-2.4-4.56-4.8h1.2c.4 1.6 1.68 2.88 3.36 3.28V6.16h2.4v4.8h1.2v-4.8h2.4v10.48c1.68-.4 2.96-1.68 3.36-3.28h1.2c-.36 2.4-2.16 4.32-4.56 4.8z"/>
                        </svg>
                    </a>
                </div>
                <div class="bubble-wrapper" data-provider="vk">
                    <a href="/api/auth/vk/login" class="provider-bubble vk">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.07 2H8.93C3.33 2 2 3.33 2 8.93v6.14C2 20.67 3.33 22 8.93 22h6.14c5.6 0 6.93-1.33 6.93-6.93V8.93C22 3.33 20.67 2 15.07 2zm3.56 14.29h-1.7c-.56 0-.74-.45-1.42-1.12-.69-.69-.98-.77-1.12-.77-.21 0-.37.16-.37.48v1.25c0 .29-.16.37-.59.37-1.12 0-2.51-.67-3.66-1.94-1.47-1.58-2.47-3.56-2.47-3.94 0-.21.16-.37.37-.37h1.7c.29 0 .45.21.56.45.53 1.28 1.44 2.47 1.76 2.47.21 0 .32-.16.32-.59v-2.09c0-.96-.56-1.07-.56-1.39 0-.16.16-.32.37-.32h2.66c.29 0 .37.21.37.48v2.67c0 .29.16.37.32.37.21 0 .45-.16.69-.48 1.07-1.31 1.6-2.99 1.6-2.99.11-.21.27-.37.56-.37h1.7c.45 0 .53.32.45.53-.24.96-2.03 3.36-2.03 3.36-.21.32-.26.48 0 .8.16.27.8.8 1.18 1.28.64.8 1.12 1.49 1.12 1.97 0 .27-.11.53-.48.53z"/>
                        </svg>
                    </a>
                </div>
            </div>

            <div class="info-text">
                Продолжая, вы соглашаетесь с <a href="#">условиями использования</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 CloudStorage.</p>
        </div>
    </footer>

    <script nonce="{{ .CSPNonce }}">
        (function() {
            const wrappers = document.querySelectorAll('.bubble-wrapper');
            const body = document.body;
            let activeBubble = null;
            let pressTimer = null;
            let pressStartTime = 0;
            let crackInterval = null;
            let redirectUrl = null;
            
            function hideOthers(activeProvider) {
                wrappers.forEach(wrapper => {
                    const provider = wrapper.getAttribute('data-provider');
                    if (provider !== activeProvider) {
                        if (provider === 'google') {
                            wrapper.style.transform = 'translateX(-500px) translateY(-100px) scale(0)';
                        } else if (provider === 'yandex') {
                            wrapper.style.transform = 'translateX(500px) translateY(-100px) scale(0)';
                        } else if (provider === 'vk') {
                            wrapper.style.transform = 'translateY(400px) scale(0)';
                        }
                        wrapper.style.opacity = '0';
                        wrapper.style.pointerEvents = 'none';
                        wrapper.style.transition = 'all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
                    }
                });
            }
            
            function showAll() {
                wrappers.forEach(wrapper => {
                    wrapper.style.transform = '';
                    wrapper.style.opacity = '';
                    wrapper.style.pointerEvents = '';
                    wrapper.style.transition = '';
                });
            }
            
            function updateCracks() {
                if (!activeBubble) return;
                const duration = Date.now() - pressStartTime;
                const level = Math.min(Math.floor(duration / 200) + 1, 9);
                for (let i = 1; i <= 9; i++) {
                    body.classList.remove(`crack-${i}`);
                }
                body.classList.add(`crack-${level}`);
                
                const bubble = activeBubble.querySelector('.provider-bubble');
                if (bubble) {
                    const baseSize = 120;
                    const maxSize = Math.min(400, window.innerWidth * 0.5);
                    const newSize = Math.min(baseSize + (duration / 10), maxSize);
                    bubble.style.width = newSize + 'px';
                    bubble.style.height = newSize + 'px';
                    
                    const svg = bubble.querySelector('svg');
                    if (svg) {
                        const svgSize = newSize * 0.5;
                        svg.style.width = svgSize + 'px';
                        svg.style.height = svgSize + 'px';
                    }
                }
            }
            
            function startPress(wrapper, event) {
                if (event) event.preventDefault();
                if (activeBubble) resetPress();
                
                activeBubble = wrapper;
                pressStartTime = Date.now();
                
                const link = wrapper.querySelector('a');
                if (link) {
                    redirectUrl = link.getAttribute('href');
                }
                
                const provider = wrapper.getAttribute('data-provider');
                hideOthers(provider);
                
                const bubble = wrapper.querySelector('.provider-bubble');
                if (bubble) bubble.classList.add('touching');
                body.classList.add('dimmed');
                
                crackInterval = setInterval(updateCracks, 50);
                
                pressTimer = setTimeout(() => {
                    if (redirectUrl) {
                        window.location.href = redirectUrl;
                    }
                }, 2000);
            }
            
            function resetPress() {
                if (pressTimer) clearTimeout(pressTimer);
                if (crackInterval) clearInterval(crackInterval);
                
                for (let i = 1; i <= 9; i++) {
                    body.classList.remove(`crack-${i}`);
                }
                body.classList.remove('dimmed');
                
                if (activeBubble) {
                    const bubble = activeBubble.querySelector('.provider-bubble');
                    if (bubble) bubble.classList.remove('touching');
                    if (bubble) {
                        bubble.style.width = '';
                        bubble.style.height = '';
                        const svg = bubble.querySelector('svg');
                        if (svg) {
                            svg.style.width = '';
                            svg.style.height = '';
                        }
                    }
                }
                
                showAll();
                activeBubble = null;
                redirectUrl = null;
            }
            
            wrappers.forEach(wrapper => {
                const link = wrapper.querySelector('a');
                
                wrapper.addEventListener('mouseenter', () => {
                    if (!activeBubble) {
                        const provider = wrapper.getAttribute('data-provider');
                        hideOthers(provider);
                    }
                });
                
                wrapper.addEventListener('mouseleave', () => {
                    if (!activeBubble) {
                        showAll();
                    }
                });
                
                wrapper.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    startPress(wrapper, e);
                });
                
                wrapper.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    if (activeBubble === wrapper && Date.now() - pressStartTime < 300) {
                        if (link) {
                            window.location.href = link.getAttribute('href');
                        }
                    }
                    resetPress();
                });
                
                wrapper.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    startPress(wrapper, e);
                }, { passive: false });
                
                wrapper.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    if (activeBubble === wrapper && Date.now() - pressStartTime < 300) {
                        if (link) {
                            window.location.href = link.getAttribute('href');
                        }
                    }
                    resetPress();
                }, { passive: false });
                
                wrapper.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    resetPress();
                });
            });
            
            document.addEventListener('mouseup', resetPress);
            document.addEventListener('touchend', resetPress);
        })();
    </script>
</body>
</html>
