version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cloud-storage-db
    environment:
      POSTGRES_DB: cloud_storage
      POSTGRES_USER: cloudstorage
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloud-network
    restart: always

  app:
    build: .
    container_name: cloud-storage-app
    environment:
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=cloudstorage
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=cloud_storage
      - UPLOAD_PATH=/app/uploads
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - LIBRARY_ADMINS=${LIBRARY_ADMINS}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - cloud-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: cloud-storage-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - cloud-network
    restart: always

networks:
  cloud-network:

volumes:
  postgres_data:
  uploads_data: